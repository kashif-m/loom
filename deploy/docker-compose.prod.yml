version: '3.9'
services:
  loom:
    build: ..
    ports:
      - "8000:8000"
    environment:
      LOOM_ENV: prod
      LOOM_DATABASE_URL: postgresql+psycopg://loom:loom@postgres:5432/loom
      LOOM_API_AUTH_ENABLED: "true"
      LOOM_INGRESS_API_KEY: change-me
      LOOM_ADMIN_API_KEY: change-me
    depends_on:
      - postgres
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: loom
      POSTGRES_USER: loom
      POSTGRES_PASSWORD: loom
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
