apiVersion: apps/v1
kind: Deployment
metadata:
  name: loom
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loom
  template:
    metadata:
      labels:
        app: loom
    spec:
      containers:
        - name: loom
          image: loom:latest
          ports:
            - containerPort: 8000
          env:
            - name: LOOM_ENV
              value: "prod"
            - name: LOOM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: loom-secrets
                  key: database_url
            - name: LOOM_API_AUTH_ENABLED
              value: "true"
            - name: LOOM_INGRESS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: loom-secrets
                  key: ingress_api_key
            - name: LOOM_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: loom-secrets
                  key: admin_api_key
---
apiVersion: v1
kind: Service
metadata:
  name: loom
spec:
  selector:
    app: loom
  ports:
    - port: 80
      targetPort: 8000
