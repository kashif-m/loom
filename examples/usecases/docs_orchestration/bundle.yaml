    connector_binding: opencode
    status: active
  - capability_id: package_application
    description: Apply finalized packages into repository files.
    connector_binding: git
    status: active
  - capability_id: terminology_validation
    description: Validate product naming and terminology consistency.
    connector_binding: none
    status: active
  - capability_id: semantic_review
    description: Validate product semantics and intent.
    connector_binding: none
    status: active
  - capability_id: scope_review
    description: Review scope boundaries and correctness.
    connector_binding: none
    status: active
  - capability_id: product_framing_review
    description: Ensure product framing accuracy.
    connector_binding: none
    status: active
  - capability_id: developer_usability_review
    description: Review developer usability of docs.
    connector_binding: none
    status: active
  - capability_id: onboarding_flow_review
    description: Review onboarding flow quality.
    connector_binding: none
    status: active
  - capability_id: integration_flow_review
    description: Review integration sequence clarity.
    connector_binding: none
    status: active
  - capability_id: friction_detection
    description: Detect developer friction points.
    connector_binding: none
    status: active
  - capability_id: audience_clarity_review
    description: Review audience-facing clarity.
    connector_binding: none
    status: active
  - capability_id: value_framing_review
    description: Review value framing quality.
    connector_binding: none
    status: active
  - capability_id: message_coherence_review
    description: Review message coherence.
    connector_binding: none
    status: active
  - capability_id: audit_execution
    description: Execute checklist-driven audits.
    connector_binding: none
    status: active
  - capability_id: checklist_validation
    description: Validate against frozen checklists.
    connector_binding: none
    status: active
  - capability_id: duplication_detection
    description: Detect duplication in package content.
    connector_binding: none
    status: active
  - capability_id: consistency_review
    description: Verify terminology and number consistency.
    connector_binding: none
    status: active
  - capability_id: explicit_failure_reporting
    description: Produce explicit pass/fail findings.
    connector_binding: none
    status: active
  - capability_id: pr_state_inspection
    description: Inspect PR state from remote systems.
    connector_binding: gh
    status: active
  - capability_id: review_feedback_detection
    description: Detect actionable review feedback.
    connector_binding: gh
    status: active
  - capability_id: promotion_readiness_evaluation
    description: Evaluate PR promotion readiness.
    connector_binding: gh
    status: active
  - capability_id: promotion_execution
    description: Execute PR promotion lifecycle steps.
    connector_binding: gh
    status: active
  - capability_id: cleanup_management
    description: Manage cleanup process after terminal outcomes.
    connector_binding: git
    status: active
  - capability_id: archival_management
    description: Manage archival and retention markers.
    connector_binding: none
    status: active
  - capability_id: mermaid_diagram_generation
    description: Generate Mermaid diagram source.
    connector_binding: none
    status: active
  - capability_id: diagram_revision
    description: Revise existing diagrams without truth drift.
    connector_binding: none
    status: active
  - capability_id: diagram_preservation_review
    description: Ensure valuable diagrams are preserved.
    connector_binding: none
    status: active
  - capability_id: visual_explanation_design
    description: Improve visual explanations for concepts.
    connector_binding: none
    status: active
  - capability_id: diagram_accessibility_support
    description: Produce alt text and accessible descriptions.
    connector_binding: none
    status: active

policies:
  - policy_id: one_task_per_object
    description: Enforce one workflow instance per task object.
    scope: workflow
    enforcement: block
    rules: {}
    status: active
  - policy_id: preserve_existing_content_default
    description: Existing content is valuable by default.
    scope: workflow
    enforcement: warn
    rules: {}
    status: active
  - policy_id: preserve_diagrams_default
    description: Existing diagrams must not be removed silently.
    scope: workflow
    enforcement: warn
    rules: {}
    status: active
  - policy_id: no_main_pr_in_development
    description: Main PR creation forbidden during development workflow.
    scope: workflow
    enforcement: block
    rules:
      deny_operation: main_pr_create
    status: active
  - policy_id: fork_first_discipline
    description: First PR must be created in fork repository.
    scope: workflow
    enforcement: warn
    rules: {}
    status: active
  - policy_id: grounding_required
    description: Factual additions must map to grounding references.
    scope: workflow
    enforcement: warn
    rules: {}
    status: active
  - policy_id: task_workflow_state_owner
    description: Task/workflow shared state is owned by kite_runner.
    scope: role
    enforcement: block
    rules:
      state_partition: task_workflow
      owner_roles: [kite_runner]
    status: active
  - policy_id: scheduler_run_state_owner
    description: Scheduler/run state is owned by kite_runner.
    scope: role
    enforcement: block
    rules:
      state_partition: scheduler_run
      owner_roles: [kite_runner]
    status: active
  - policy_id: pr_lifecycle_state_owner
    description: PR lifecycle state is owned by product_analyst.
    scope: role
    enforcement: block
    rules:
      state_partition: pr_lifecycle
      owner_roles: [product_analyst]
    status: active
  - policy_id: cleanup_archive_state_owner
    description: Cleanup/archive state is owned by product_analyst.
    scope: role
    enforcement: block
    rules:
      state_partition: cleanup_archive
      owner_roles: [product_analyst]
    status: active

prompts:
  - profile_id: kite_runner_prompt
    version: 1
    domain_pack: docs.orchestration
    system_prompt: >
      You are Kite Runner, workflow-bound orchestrator. Enforce step ownership,
      deterministic transitions, and explicit state discipline.
    status: active
  - profile_id: technical_writer_prompt
    version: 1
    domain_pack: docs.orchestration
    system_prompt: >
      You are Technical Writer. Convert grounded truth into clear,
      maintainable documentation without inventing facts.
    status: active
  - profile_id: developer_prompt
    version: 1
    domain_pack: docs.orchestration
    system_prompt: >
      You are Developer. Execute package changes safely with preflight,
      worktree isolation, and fork-first PR discipline.
    status: active
  - profile_id: product_analyst_prompt
    version: 1
    domain_pack: docs.orchestration
    system_prompt: >
      You are Product Analyst. Own PR lifecycle state with fresh checks
      and explicit promotion gate evaluation.
    status: active

agents:
  - role_id: kite_runner
    title: Kite Runner
    domain_pack: docs.orchestration
    capability_ids:
      - workflow_selection
      - task_routing
      - context_resolution
      - package_aggregation
      - state_write
      - state_read
      - subworkflow_dispatch
      - fanout_management
      - fanin_reporting
    policy_ids:
      - one_task_per_object
      - grounding_required
      - task_workflow_state_owner
      - scheduler_run_state_owner
    memory_visibility:
      - docs.orchestration
    status: active
  - role_id: technical_writer
    title: Technical Writer
    domain_pack: docs.orchestration
    capability_ids:
      - package_writing
      - structural_editing
      - readability_improvement
      - cross_reference_design
      - package_revision
    policy_ids:
      - preserve_existing_content_default
      - preserve_diagrams_default
    memory_visibility:
      - docs.orchestration
    status: active
  - role_id: developer
    title: Developer
    domain_pack: docs.orchestration
    capability_ids:
      - repo_target_validation
      - execution_preflight
      - worktree_management
      - fork_branching
      - fork_pr_creation
      - technical_grounding
      - package_application
    policy_ids:
      - fork_first_discipline
      - no_main_pr_in_development
    memory_visibility:
      - docs.orchestration
    status: active
  - role_id: product_manager
    title: Product Manager
    domain_pack: docs.orchestration
    capability_ids:
      - terminology_validation
      - semantic_review
      - scope_review
      - product_framing_review
