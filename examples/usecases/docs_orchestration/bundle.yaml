    description: Select the correct workflow for a task.
    connector_binding: none
    status: active
  - capability_id: task_routing
    description: Route tasks across workflows and roles.
    connector_binding: none
    status: active
  - capability_id: context_resolution
    description: Resolve source context before execution.
    connector_binding: opencode
    status: active
  - capability_id: package_aggregation
    description: Aggregate specialist outputs into a package.
    connector_binding: none
    status: active
  - capability_id: state_write
    description: Write orchestrator-owned shared state.
    connector_binding: none
    status: active
  - capability_id: state_read
    description: Read shared orchestration state.
    connector_binding: none
    status: active
  - capability_id: subworkflow_dispatch
    description: Dispatch subworkflow execution.
    connector_binding: none
    status: active
  - capability_id: fanout_management
    description: Split one request into one-task-per-object execution.
    connector_binding: none
    status: active
  - capability_id: fanin_reporting
    description: Aggregate independent task outcomes for reporting.
    connector_binding: none
    status: active
  - capability_id: package_writing
    description: Produce high-quality documentation package drafts.
    connector_binding: none
    status: active
  - capability_id: structural_editing
    description: Improve documentation structure and hierarchy.
    connector_binding: none
    status: active
  - capability_id: readability_improvement
    description: Improve scannability and readability.
    connector_binding: none
