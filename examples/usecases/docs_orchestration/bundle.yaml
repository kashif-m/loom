    description: Revise documentation package from feedback.
    connector_binding: none
    status: active
  - capability_id: repo_target_validation
    description: Validate source URL to repository target mapping.
    connector_binding: opencode
    status: active
  - capability_id: execution_preflight
    description: Execute preflight checks before repository changes.
    connector_binding: git
    status: active
  - capability_id: worktree_management
    description: Create or reuse worktrees for isolated execution.
    connector_binding: git
    status: active
  - capability_id: fork_branching
    description: Manage fork branch lifecycle for execution.
    connector_binding: git
    status: active
  - capability_id: fork_pr_creation
    description: Create and update fork pull requests.
    connector_binding: gh
    status: active
  - capability_id: technical_grounding
