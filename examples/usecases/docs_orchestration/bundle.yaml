      - audience_clarity_review
      - value_framing_review
      - message_coherence_review
    policy_ids: []
    memory_visibility:
      - docs.orchestration
    status: active
  - role_id: testing
    title: Testing
    domain_pack: docs.orchestration
    capability_ids:
      - audit_execution
      - checklist_validation
      - duplication_detection
      - consistency_review
      - explicit_failure_reporting
    policy_ids: []
    memory_visibility:
      - docs.orchestration
    status: active
  - role_id: product_analyst
    title: Product Analyst
    domain_pack: docs.orchestration
    capability_ids:
      - pr_state_inspection
      - review_feedback_detection
      - promotion_readiness_evaluation
      - promotion_execution
      - cleanup_management
      - archival_management
    policy_ids:
      - pr_lifecycle_state_owner
      - cleanup_archive_state_owner
    memory_visibility:
      - docs.orchestration
    status: active
  - role_id: product_designer
    title: Product Designer
    domain_pack: docs.orchestration
    capability_ids:
      - mermaid_diagram_generation
      - diagram_revision
      - diagram_preservation_review
      - visual_explanation_design
      - diagram_accessibility_support
    policy_ids:
      - preserve_diagrams_default
    memory_visibility:
      - docs.orchestration
    status: active

