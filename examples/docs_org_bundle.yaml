organization:
  name: "Docs Organization"
  litellm_base_url: "http://localhost:4000"
  litellm_api_key: "replace-with-real-key"
  litellm_default_model: "openai/gpt-4.1-mini"
  opencode_enabled: true
  opencode_cmd: "opencode"

capabilities:
  - capability_id: docs_context
    description: Build repository and product context for docs updates.
    connector_binding: opencode
    status: active
  - capability_id: docs_edit
    description: Draft and update markdown documentation.
    connector_binding: none
    status: active

prompts:
  - profile_id: docs_maintainer_prompt
    version: 1
    domain_pack: docs
    system_prompt: >
      You are a documentation maintainer. Keep changes technically correct,
      concise, and easy to review.
    status: active

agents:
  - role_id: docs_maintainer
    title: Documentation Maintainer
    domain_pack: docs
    capability_ids: [docs_context, docs_edit]
    policy_ids: []
    memory_visibility: [docs]
    status: active

workflows:
  - workflow_id: docs_maintenance
    version: 1
    title: Docs Maintenance Workflow
    domain_pack: docs
    intent_group: task_authoring
    activate: true
    markdown: |
      ## Title
      Docs Maintenance Workflow
      ## Purpose
      Maintain and improve documentation content in a deterministic flow.
      ## Trigger
      Docs enhancement or correction request.
      ## Required Inputs
      - topic
      ## Steps
      1. Gather context
      - id: gather_context
      - owned_by: docs_maintainer
      - required_capabilities: docs_context
      - on_success: draft_update
      2. Draft update
      - id: draft_update
      - owned_by: docs_maintainer
      - required_capabilities: docs_edit
      - on_success: completed
      ## Completion Criteria
      Updated documentation draft is ready.
      ## Blocked Conditions
      Missing topic or source context.
      ## Failure Conditions
      Runtime adapter failures.
      ## Rules
      - raise PR only
