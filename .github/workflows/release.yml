name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t loom:release .
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: loom:release
          output-file: sbom.spdx.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loom-release
          path: |
            sbom.spdx.json
