name: Security

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,integrations]'
          pip install pip-audit bandit
      - name: Dependency audit
        run: pip-audit || true
      - name: SAST (bandit)
        run: bandit -r loom -q
