policies:
  - policy_id: no_direct_merge
    description: Direct merge is prohibited
    scope: global
    enforcement: block
    rules:
      deny_operation: merge
    status: active
  - policy_id: raise_pr_only
    description: Changes must flow via PR
    scope: workflow
    enforcement: block
    rules:
      deny_operation: direct_push_to_main
    status: active
  - policy_id: approval_required_before_promotion
    description: Promotion requires approval
    scope: workflow
    enforcement: block
    rules:
      requires_approval: true
    status: active
